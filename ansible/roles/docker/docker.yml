    #     state: absent
    #     purge: yes

    # - name: Remover containerd do Debian (se existir)
    #   apt:
    #     name: containerd
    #     state: absent
    #     purge: yes

    # - name: Remover diretórios antigos
    #   file:
    #     path: "{{ item }}"
    #     state: absent
    #   loop:
    #     - /var/lib/docker
    #     - /etc/docker
    #     - /var/lib/containerd
#########################################################

    - name: Atualizar cache apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instalar dependências
      apt:
        name:
          - gnupg
          - ca-certificates
          - curl
        state: present

    - name: Criar diretório de keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Baixar chave GPG Docker
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /tmp/docker.gpg

    - name: Converter chave
      command: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Ajustar permissão da chave
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Adicionar repositório Docker
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present

    - name: Atualizar cache apt (repo novo)
      apt:
        update_cache: yes

    - name: Instalar containerd
      apt:
        name: containerd.io
        state: present

    - name: Criar diretório config
      file:
        path: /etc/containerd
        state: directory

    - name: Gerar config padrão
      command: containerd config default
      register: containerd_config
      changed_when: false

    - name: Salvar config (uma vez)
      copy:
        dest: /etc/containerd/config.toml
        content: "{{ containerd_config.stdout }}"
        force: no
      notify: restart containerd

    - name: Ajustar SystemdCgroup
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: restart containerd

    - name: Garantir containerd ativo
      service:
        name: containerd
        state: started
        enabled: yes

  handlers:
    - name: restart containerd
      service:
        name: containerd
        state: restarted

    - name: Criar config do Docker (cgroup systemd)
      copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "exec-opts": ["native.cgroupdriver=systemd"],
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "100m"
            },
            "storage-driver": "overlay2"
          }
      notify: restart docker

    - name: Garantir que o Docker está ativo
      service:
        name: "{{ docker_service }}"
        state: started
        enabled: yes

    - name: Adicionar usuário ao grupo docker
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # 🔥 IMPORTANTE PRA K8S
    - name: Desabilitar swap (runtime)
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Remover swap do fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '# \1'
    
    - name: Instalar dependências
      apt:
        name:
          - gnupg
          - ca-certificates
          - curl
        state: present

